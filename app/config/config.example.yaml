app:
  appName: "simple-ai-agent-bot"
  environment: "local"
  dataRootPath: "./data"
  displayTimeZone: "Europe/Moscow"

telegram:
  pollingTimeoutSeconds: 30
  allowedUserIds:
    - 123456789
  denyMessageText: "Доступ запрещён"

tools:
  toolsConfigPath: "./app/config/tools.yaml"

models:
  openRouterBaseUrl: "https://openrouter.ai/api/v1"
  primaryModel: "nvidia/nemotron-3-super-120b-a12b:free"
  secondaryModel: "openai/gpt-oss-120b:free"
  tertiaryModel: "qwen/qwen3-coder:free"
  requestTimeoutSeconds: 45
  retryCountBeforeFallback: 2
  returnToPrimaryCooldownSeconds: 300

runtime:
  maxSteps: 8
  maxToolCalls: 4
  maxExecutionSeconds: 180
  maxToolOutputChars: 8000
  maxPromptChars: 24000
  recentMessagesLimit: 12
  sessionSummaryMaxChars: 2000
  skillSelectionMaxCount: 4
  toolCallHistoryWindowSize: 8
  maxSameToolSignatureInWindow: 3
  maxToolCallBlockedIterations: 3
  extraSecondsPerLlmError: 45
  maxExtraSecondsTotal: 180

security:
  webSessionCookieTtlSeconds: 43200
  maxAdminTokens: 3
  adminWritesEnabled: false
  bindSessionToIp: false
  trustProxyHeaders: false
  trustedProxyIps: []
  allowedReadOnlyPaths:
    - "./data/memory"
    - "./data/runs"
    - "./data/logs"

logging:
  logsDirPath: "./data/logs"
  runLogsFileName: "run.jsonl"
  appLogsFileName: "app.log"
  maxBytes: 10485760
  backupCount: 5

skills:
  # В контейнере директория кода может быть read-only, поэтому skills лучше хранить в ./data (volume).
  skillsDirPath: "./data/skills"

memory:
  memoryRootPath: "./data/memory"
  longTermFileName: "long_term.md"
  sessionSummaryFileName: "summary.md"
  recentMessagesFileName: "recent.md"

scheduler:
  enabled: false
  schedulesConfigPath: "./app/config/schedules.yaml"
  tickSeconds: 1

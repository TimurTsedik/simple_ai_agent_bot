# Эти jobs запускаются внутри сервиса (variant B).
# Для включения:
# - scheduler.enabled=true в app/config/config.yaml
# - скопировать этот файл в app/config/schedules.yaml
tickSeconds: 1
jobs:
  - jobId: "email_digest_hourly"
    enabled: true
    schedule:
      intervalSeconds: 3600
      allowedHourStart: 8
      allowedHourEnd: 23
    actionInternalRun:
      sessionId: "scheduler:email"
      message: "прочитай непрочитанные письма и сделай дайджест"

  - jobId: "telegram_news_digest_hourly"
    enabled: true
    schedule:
      intervalSeconds: 3600
      allowedHourStart: 8
      allowedHourEnd: 23
    actionInternalRun:
      sessionId: "scheduler:telegram_news"
      message: "покажи дайджест экономических новостей за последние 1 час"

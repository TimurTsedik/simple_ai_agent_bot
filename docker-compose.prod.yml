services:
  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    container_name: simple-ai-agent-bot
    user: "1001:1001"
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
      - ./config/config.yaml:/app/app/config/config.yaml:ro
      # Должен совпадать с ADMIN_TELEGRAM_USER_ID (.env): папка = telegramUser_<id>
      - ./config/tools.yaml:/app/data/memory/sessions/telegramUser_16739703/tools.yaml:ro
      - ./config/schedules.yaml:/app/data/memory/sessions/telegramUser_16739703/schedules.yaml
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read(); print('ok')\""]
      interval: 20s
      timeout: 5s
      retries: 6

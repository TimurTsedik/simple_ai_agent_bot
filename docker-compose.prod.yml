services:
  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    container_name: simple-ai-agent-bot
    user: "1001:1001"
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.simple-ai-agent-bot.rule=Host(`srv1492259.hstgr.cloud`) || Host(`openclaw-z1pw.srv1492259.hstgr.cloud`)"
      - "traefik.http.routers.simple-ai-agent-bot.entrypoints=websecure"
      - "traefik.http.routers.simple-ai-agent-bot.tls=true"
      - "traefik.http.routers.simple-ai-agent-bot.tls.certresolver=letsencrypt"
      - "traefik.http.services.simple-ai-agent-bot.loadbalancer.server.port=8000"
    env_file:
      - ./.env
    volumes:
      # Персистентность: всё под ./data (memory, runs, logs; при skills.skillsDirPath: ./data/skills — и скиллы)
      - ./data:/app/data
      - ./config/config.yaml:/app/app/config/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read(); print('ok')\""]
      interval: 20s
      timeout: 5s
      retries: 6
